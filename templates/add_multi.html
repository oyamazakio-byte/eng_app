<h1 style="font-size:60px;text-align:center;margin-bottom:30px;">
📚 ロールプレイ追加
</h1>

<!-- ★ エラー表示 -->
{% if error %}
<div style="
color:red;
font-size:32px;
margin:20px;
text-align:center;">
{{ error }}
</div>
{% endif %}

<form method="post" style="padding:10px;">

<label style="font-size:36px;">タイトル</label><br>
<input
name="title"
value="{{ title or '' }}"
placeholder="例: 空港での会話"
style="
font-size:40px;
width:100%;
padding:22px;
margin-bottom:30px;
border-radius:12px;
border:4px solid #333;
">

<label style="font-size:36px;">会話（A: / B:）</label><br>

<textarea
name="lines"
rows="10"
placeholder="A: Hello. Can I get a coffee?
B: Sure. Hot or iced?
A: Hot, please."
style="
font-size:36px;
width:100%;
padding:22px;
border-radius:12px;
border:4px solid #333;
line-height:1.6;
"
>{{ lines or '' }}</textarea>
<br><br>

<button style="
font-size:42px;
padding:25px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:15px;">
💾 保存
</button>

</form>

<br>

<button onclick="location.href='/eng/'"
style="
font-size:32px;
padding:20px;
width:100%;
background:#777;
color:white;
border:none;
border-radius:12px;">
← 一覧に戻る
</button>
