<h1 style="font-size:40px;">{{ conv.title }}</h1>

<hr>

<button onclick="playAll()" style="font-size:34px;padding:20px;width:100%;margin:10px;">
▶ 全体再生
</button>

<button onclick="trainingAll()" style="font-size:34px;padding:20px;width:100%;margin:10px;background:#ff9800;color:white;">
🎧 トレーニング
</button>

<button onclick="shadowingStart()" style="font-size:34px;padding:20px;width:100%;margin:10px;background:#4caf50;color:white;">
🎤 シャドーイング
</button>

<button onclick="stopAll()" style="font-size:34px;padding:20px;width:100%;margin:10px;">
⏹ 停止
</button>

<hr>

<!-- ★ モード切替 -->
<button onclick="toggleMode()" id="modeBtn"
style="font-size:30px;padding:16px;width:100%;margin:10px;background:#673ab7;color:white;">
🎓 学習モード
</button>

<button onclick="toggleKana()" style="font-size:28px;width:100%;margin:5px;">
カタカナ ON/OFF
</button>

<button onclick="toggleJP()" style="font-size:28px;width:100%;margin:5px;">
日本語 ON/OFF
</button>

<hr>

<div id="chat">

{% for m in messages %}
<div class="line"
data-text="{{ m.text }}"
style="
margin:20px;
padding:20px;
border-radius:12px;
{% if m.speaker == 'A' %}
background:#e3f2fd;
{% else %}
background:#fff3e0;
{% endif %}
">

<b style="font-size:30px;">{{ m.speaker }}:</b>

<div style="font-size:60px;font-weight:bold;">
{{ m.text }}
</div>

<!-- ★ カタカナ（モード対応） -->
<div class="kana"
data-normal="{{ m.kana }}"
data-native="{{ m.kana_native }}"
style="font-size:40px;color:#555;">
{{ m.kana }}
</div>

<div class="jp" style="font-size:36px;color:#007bff;">
{{ m.japanese }}
</div>

<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">

<button onclick="playOne(this)"
data-text="{{ m.text }}"
style="font-size:22px;background:#9c27b0;color:white;padding:10px 14px;border:none;border-radius:8px;">
▶ 再生
</button>

<button onclick="retranslate({{ m.id }})"
style="font-size:22px;background:#2196f3;color:white;padding:10px 14px;border:none;border-radius:8px;">
🔄 再翻訳
</button>

</div>

</div>
{% endfor %}

</div>

<hr>

<button onclick="location.href='/eng/'"
style="font-size:30px;padding:20px;width:100%;">
← 一覧に戻る
</button>

<script>
let playing = false;
let training = false;
let shadowing = false;
let index = 0;
let lines = [];

let kanaVisible = true;
let jpVisible = true;

// ★ モード
let nativeMode = false;

let voices = [];

function loadVoices(){
    voices = speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged = loadVoices;

window.onload = function() {
    lines = document.querySelectorAll(".line");
    loadVoices();
};

// --------------------
// モード切替（重要）
// --------------------
function toggleMode(){

    nativeMode = !nativeMode;

    const btn = document.getElementById("modeBtn");

    if(nativeMode){
        btn.innerText = "🗣 ネイティブモード";
        btn.style.background = "#e91e63";
    }else{
        btn.innerText = "🎓 学習モード";
        btn.style.background = "#673ab7";
    }

    document.querySelectorAll(".kana").forEach(el=>{
        if(nativeMode){
            el.innerText = el.dataset.native || el.dataset.normal;
        }else{
            el.innerText = el.dataset.normal;
        }
    });
}

// 表示切替
function toggleKana(){
    kanaVisible = !kanaVisible;
    document.querySelectorAll(".kana").forEach(el=>{
        el.style.display = kanaVisible ? "block":"none";
    });
}

function toggleJP(){
    jpVisible = !jpVisible;
    document.querySelectorAll(".jp").forEach(el=>{
        el.style.display = jpVisible ? "block":"none";
    });
}

// ▶ 全体再生
function playAll() {
    stopAll();
    playing = true;
    index = 0;
    playLoop();
}

function playLoop() {
    if (!playing || index >= lines.length) return;

    speak(lines[index].dataset.text);
    index++;

    setTimeout(playLoop, 2500);
}

// 🎧 トレーニング
function trainingAll() {
    stopAll();
    training = true;
    index = 0;
    trainingLoop();
}

function trainingLoop() {
    if (!training || index >= lines.length) return;

    speak(lines[index].dataset.text);
    index++;

    setTimeout(trainingLoop, 4000);
}

// 🎤 シャドーイング
function shadowingStart() {
    stopAll();
    shadowing = true;
    index = 0;
    shadowLoop();
}

function shadowLoop() {
    if (!shadowing || index >= lines.length) return;

    speak(lines[index].dataset.text);

    setTimeout(() => {
        index++;
        shadowLoop();
    }, 4000);
}

// ⏹ 停止
function stopAll() {
    playing = false;
    training = false;
    shadowing = false;
    speechSynthesis.cancel();
}

// ▶ 個別再生
function playOne(btn){
    stopAll();
    speak(btn.dataset.text);
}

// 🔄 再翻訳
function retranslate(id){
    fetch("/eng/retranslate/" + id, {
        method: "POST"
    })
    .then(() => {
        location.reload();
    });
}

// 音声
function speak(text) {

    speechSynthesis.cancel();

    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'en-US';
    uttr.rate = 0.9;

    if (voices.length > 0) {
        const enVoice = voices.find(v => v.lang.includes('en'));
        if (enVoice) uttr.voice = enVoice;
    }

    speechSynthesis.speak(uttr);
}
</script>
