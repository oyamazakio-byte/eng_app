<h1 style="
font-size:48px;
text-align:center;
margin-bottom:20px;">
編集
</h1>

<form method="post" style="padding:10px;">

<label style="font-size:32px;">タイトル</label><br>
<input name="title" value="{{ item.title }}"
style="
font-size:36px;
width:100%;
padding:22px;
margin-bottom:25px;
border-radius:10px;
border:4px solid #333;  /* ★ 太く */
"><br>

<label style="font-size:32px;">英語 A</label><br>
<input name="english_a" value="{{ item.english_a }}"
style="
font-size:36px;
width:100%;
padding:22px;
margin-bottom:25px;
border-radius:10px;
border:4px solid #333;
"><br>

<label style="font-size:32px;">英語 B</label><br>
<input name="english_b" value="{{ item.english_b }}"
style="
font-size:36px;
width:100%;
padding:22px;
margin-bottom:30px;
border-radius:10px;
border:4px solid #333;
"><br>

<button style="
font-size:40px;
padding:25px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:15px;">
💾 保存
</button>

</form>

<br>

<button onclick="location.href='/eng/'"
style="
font-size:32px;
padding:20px;
width:100%;
background:#777;
color:white;
border:none;
border-radius:10px;">
← 一覧に戻る
</button>
