<h1 style="font-size:50px; text-align:center;">
複数会話を編集
</h1>

<form method="post" style="padding:10px;">

<label style="font-size:36px;">タイトル</label><br>
<input name="title" value="{{ conv.title }}"
style="
font-size:40px;
width:100%;
padding:20px;
border:4px solid #333;
border-radius:12px;
margin-bottom:20px;
">

<label style="font-size:36px;">会話（A: / B:）</label><br>

<textarea name="lines" rows="10"
style="
font-size:36px;
width:100%;
padding:20px;
border:4px solid #333;
border-radius:12px;
line-height:1.6;
">
{{ lines }}
</textarea>

<br><br>

<button style="
font-size:40px;
padding:25px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;">
💾 更新
</button>

</form>

<br>

<button onclick="location.href='/eng/'"
style="
font-size:32px;
padding:20px;
width:100%;
background:#777;
color:white;
border:none;
border-radius:12px;">
← 一覧に戻る
</button>
