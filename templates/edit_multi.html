<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>会話編集</title>

<style>

body{
    font-family:sans-serif;
    margin:20px;
}

input[type="text"]{
    width:100%;
    font-size:18px;
    padding:8px;
    margin-bottom:12px;
}

textarea{
    width:100%;
    height:400px;
    font-size:18px;
    padding:10px;
}

button{
    font-size:18px;
    padding:10px 20px;
    margin-top:15px;
}

</style>
</head>

<body>

<h2>会話編集</h2>

<form method="POST">

<input
    type="text"
    name="title"
    value="{{ conv.title }}"
    required
>

<textarea
    name="lines"
    required
>{{ lines }}</textarea>

<br>

<button type="submit">
保存して再翻訳
</button>

</form>

<br>

<a href="/eng/">← 一覧へ戻る</a>

</body>
</html>
