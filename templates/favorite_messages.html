<h1 style="
font-size:60px;
text-align:center;
margin-bottom:30px;
">

⭐ お気に入り例文

</h1>

<!-- 🔙 戻る -->
<a href="/eng/"
style="
display:block;
font-size:36px;
padding:20px;
background:#4CAF50;
color:white;
text-align:center;
border-radius:15px;
text-decoration:none;
margin-bottom:25px;
">

← 会話一覧へ戻る

</a>

<hr>

<ul style="
list-style:none;
padding:0;
">

{% for row in data %}

<li style="
margin-bottom:35px;
padding:28px;
border:3px solid #ccc;
border-radius:15px;
background:#fffde7;
">

<!-- タイトル -->
<div style="
font-size:26px;
color:#666;
margin-bottom:15px;
font-weight:bold;
">

📚 {{ row.title }}

</div>

<!-- 英文 -->
<div style="
font-size:48px;
font-weight:bold;
margin-bottom:15px;
">

{{ row.text }}

</div>

<!-- カタカナ -->
<div style="
font-size:34px;
color:#555;
margin-bottom:15px;
">

{{ row.kana }}

</div>

<!-- 日本語 -->
<div style="
font-size:30px;
color:#1565c0;
font-weight:bold;
margin-bottom:20px;
">

{{ row.japanese }}

</div>

<!-- ボタン -->
<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
">

<!-- ▶ 再生 -->
<button onclick="playText(this)"
data-text="{{ row.text }}"
style="
font-size:24px;
padding:14px 18px;
background:#9c27b0;
color:white;
border:none;
border-radius:10px;">

▶ 再生

</button>

<!-- ⭐ 解除 -->
<form action="/eng/message_favorite/{{ row.id }}"
method="post"
style="display:inline;">

<button type="submit"
style="
font-size:24px;
padding:14px 18px;
background:#FFD54F;
color:black;
border:none;
border-radius:10px;">

⭐ 解除

</button>

</form>

<!-- 📚 会話へ -->
<a href="/eng/detail_multi/{{ row.conversation_id }}"
style="text-decoration:none;">

<button type="button"
style="
font-size:24px;
padding:14px 18px;
background:#2196F3;
color:white;
border:none;
border-radius:10px;">

📚 会話へ

</button>

</a>

</div>

</li>

{% endfor %}

</ul>

<script>

function playText(btn){

    speechSynthesis.cancel();

    const uttr =
        new SpeechSynthesisUtterance(
            btn.dataset.text
        );

    uttr.lang = "en-US";
    uttr.rate = 0.9;

    speechSynthesis.speak(uttr);
}

</script>
