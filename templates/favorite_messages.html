<h1 style="
font-size:60px;
text-align:center;
margin-bottom:30px;
">

⭐ お気に入り例文

</h1>

<!-- 🔙 戻る -->
<a href="/eng/"
style="
display:block;
font-size:36px;
padding:20px;
background:#4CAF50;
color:white;
text-align:center;
border-radius:15px;
text-decoration:none;
margin-bottom:25px;
">

← 会話一覧へ戻る

</a>

<hr>

<ul style="
list-style:none;
padding:0;
">

{% for row in data %}

<li style="
margin-bottom:35px;
padding:28px;
border:3px solid #ccc;
border-radius:15px;
background:#fff8e1;
">

<!-- タイトル -->
<div style="
font-size:28px;
color:#666;
margin-bottom:12px;
font-weight:bold;
">

📚 {{ row.title }}

</div>

<!-- 英文 -->
<div style="
font-size:48px;
font-weight:bold;
margin-bottom:15px;
">

{{ row.text }}

</div>

<!-- カタカナ -->
<div style="
font-size:34px;
color:#555;
margin-bottom:10px;
">

{{ row.kana }}

</div>

<!-- 日本語 -->
<div style="
font-size:32px;
color:#007bff;
font-weight:bold;
margin-bottom:20px;
">

{{ row.japanese }}

</div>

<!-- ボタン -->
<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
">

<!-- ▶ 再生 -->
<button
onclick="speak('{{ row.text }}')"

style="
font-size:24px;
padding:14px;
background:#9c27b0;
color:white;
border:none;
border-radius:10px;">

▶ 再生

</button>

<!-- ⭐ 解除 -->
<div style="display:inline;">

<button
onclick="toggleMessageFavorite(this, {{ row.id }})"

style="
font-size:24px;
padding:14px;
background:#FFD54F;
color:black;
border:none;
border-radius:10px;">

⭐ 解除

</button>

</div>

<!-- 📍 会話へ -->
<button
onclick="
location.href=
'/eng/detail_multi/{{ row.conversation_id }}?msg_id={{ row.id }}'
"

style="
font-size:24px;
padding:14px;
background:#4CAF50;
color:white;
border:none;
border-radius:10px;">

📍 会話へ

</button>

</div>

</li>

{% endfor %}

</ul>

<script>

// 音声再生
function speak(text){

    speechSynthesis.cancel();

    const uttr =
        new SpeechSynthesisUtterance(text);

    uttr.lang = "en-US";
    uttr.rate = 0.9;

    speechSynthesis.speak(uttr);
}

// ⭐ お気に入り解除
function toggleMessageFavorite(btn, id){

    fetch(
        "/eng/message_favorite/" + id,
        {
            method: "POST"
        }
    )
    .then(res => res.json())
    .then(data => {

        // 解除されたら消す
        if(data.favorite == 0){

            const item =
                btn.closest("li");

            if(item){
                item.remove();
            }
        }
    });
}

</script>
