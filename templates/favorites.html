<h1 style="
font-size:60px;
text-align:center;
margin-bottom:30px;
">

⭐ お気に入り会話

</h1>

<!-- 🔙 戻る -->
<a href="/eng/admin_menu"
style="
display:block;
font-size:36px;
padding:20px;
background:#607D8B;
color:white;
text-align:center;
border-radius:15px;
text-decoration:none;
margin-bottom:25px;
">

⚙ 管理一覧

</a>
<hr>

<ul style="
list-style:none;
padding:0;
">

{% for row in data %}

<li style="
margin-bottom:35px;
padding:28px;
border:3px solid #ccc;
border-radius:15px;
background:#fff8e1;
">

<a href="/eng/detail_multi/{{ row.id }}"
style="
font-size:48px;
font-weight:bold;
text-decoration:none;
color:black;
">

⭐ {{ row.title }}

</a>

<div style="
display:flex;
gap:10px;
margin-top:20px;
">

<!-- ⭐ お気に入り解除 -->
<form action="/eng/favorite/{{ row.id }}"
method="post"
style="flex:1;">

<input type="hidden"
name="next"
value="/eng/favorites">

<button type="submit"
style="
font-size:26px;
padding:25px;
width:100%;
background:#FFD54F;
color:black;
border:none;
border-radius:12px;">

⭐ お気に入り解除

</button>

</form>

<!-- ✏ 編集 -->
<a href="/eng/edit/{{ row.id }}"
style="
flex:1;
text-decoration:none;">

<button type="button"
style="
font-size:26px;
padding:25px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;">

✏ 編集

</button>

</a>

<!-- 🗑 削除 -->
<form action="/eng/delete/{{ row.id }}"
method="post"
style="flex:1;">

<button type="submit"
onclick="return confirm('削除しますか？');"
style="
font-size:32px;
padding:25px;
width:100%;
background:#e53935;
color:white;
border:none;
border-radius:12px;">

🗑 削除

</button>

</form>

</div>

</li>

{% endfor %}

</ul>
