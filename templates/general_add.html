<h1 style="
font-size:42px;
margin:20px 0;
">
一般英語追加
</h1>

<form method="POST" action="/eng/general_import">

<div style="
font-size:28px;
font-weight:bold;
margin-bottom:10px;
">
会話タイトル
</div>

<input
type="text"
name="conv_title"
placeholder="例: get の使い方"
style="
width:100%;
font-size:28px;
padding:18px;
margin-bottom:25px;
box-sizing:border-box;
">

<div style="
font-size:28px;
font-weight:bold;
margin-bottom:10px;
">
サブカテゴリ
</div>

<select
name="subcategory"
style="
width:100%;
font-size:28px;
padding:18px;
margin-bottom:25px;
box-sizing:border-box;
">

<option value="短文">
📘 短文
</option>

<option value="長文">
📘 長文
</option>

</select>

<div style="
font-size:28px;
font-weight:bold;
margin-bottom:10px;
">
英文
</div>

<textarea
name="english_text"
placeholder="ここに英文を入力"
style="
width:100%;
height:400px;
font-size:28px;
padding:20px;
box-sizing:border-box;
"></textarea>

<br><br>

<button
type="submit"
style="
font-size:32px;
padding:20px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;
">

一般英語取り込み

</button>

</form>
