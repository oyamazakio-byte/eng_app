<h1 style="font-size:60px; text-align:center;">会話一覧</h1>

<!-- 📊 辞書統計 -->
<div style="
background:#f5f5f5;
padding:20px;
margin-bottom:25px;
border-radius:15px;
border:3px solid #ccc;
font-size:26px;
line-height:1.8;
">

📘 PHRASE: {{ phrase_count }}<br>
🈯 TRANS: {{ trans_count }}<br>
🔤 WORD: {{ word_count }}<br>
🗣 NATIVE: {{ native_count }}<br>
💾 KANA CACHE: {{ kana_cache_count }}<br>
🧠 TRANS CACHE: {{ trans_cache_count }}

</div>

<!-- 🔄 一括再翻訳 -->
<form action="/eng/retranslate_all" method="post">

<button type="submit"
style="
font-size:32px;
padding:20px;
width:100%;
background:#2196F3;
color:white;
border:none;
border-radius:12px;
margin-bottom:20px;">

🔄 全データ再翻訳

</button>

</form>

<!-- 🔍 検索 -->
<form method="get" action="/eng/" style="margin:25px 0; display:flex; gap:10px;">

<input name="q"
value="{{ q if q else '' }}"
placeholder="検索"
style="
flex:3;
font-size:40px;
padding:24px;
border-radius:12px;
border:4px solid #333;">

<button type="submit"
style="
flex:1;
font-size:34px;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;">

検索

</button>

</form>

<a href="/eng/add_multi"
style="
display:block;
font-size:40px;
padding:24px;
background:#ff9800;
color:white;
text-align:center;
border-radius:15px;
margin-bottom:20px;
text-decoration:none;">

📚 複数会話を追加

</a>

<hr>

<ul style="list-style:none; padding:0;">

{% for row in data %}

<li style="
margin-bottom:35px;
padding:28px;
border:3px solid #ccc;
border-radius:15px;
background:#fafafa;">

<a href="/eng/detail_multi/{{ row.id }}"
style="
font-size:48px;
font-weight:bold;
text-decoration:none;
color:black;">

📚 {{ row.title }}

</a>

<div style="display:flex; gap:10px; margin-top:20px;">

<!-- 編集 -->
<a href="/eng/edit/{{ row.id }}"
style="
flex:1;
text-decoration:none;">

<button type="button"
style="
font-size:32px;
padding:25px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;">

✏ 編集

</button>

</a>

<!-- 削除 -->
<form action="/eng/delete/{{ row.id }}"
method="post"
style="flex:1;">

<button type="submit"
onclick="return confirm('削除しますか？');"
style="
font-size:32px;
padding:25px;
width:100%;
background:#e53935;
color:white;
border:none;
border-radius:12px;">

🗑 削除

</button>

</form>

</div>

</li>

{% endfor %}

</ul>
