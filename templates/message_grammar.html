<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<title>文法ノート</title>

<style>

body{
    font-family:sans-serif;
    padding:20px;
    padding-top:90px;
}

.eng{
    font-size:26px;
    margin-bottom:20px;
    line-height:1.6;
}

textarea{
    width:100%;
    height:500px;
    font-size:18px;
    padding:10px;
}

button{
    font-size:20px;
    padding:10px 20px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="eng">
{{ row.text }}
</div>

<form method="POST">

<textarea name="grammar_note">
{{ row.grammar_note or "" }}
</textarea>

<div style="
position:fixed;
top:10px;
right:10px;
z-index:9999;
display:flex;
gap:10px;
">

<button
type="submit"
style="
font-size:20px;
padding:12px 18px;
background:#4caf50;
color:white;
border:none;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
">
💾 保存
</button>

<button
type="button"
onclick="history.back()"
style="
font-size:20px;
padding:12px 18px;
background:#9e9e9e;
color:white;
border:none;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
">
← 戻る
</button>

</div>

</form>

</body>
</html>
