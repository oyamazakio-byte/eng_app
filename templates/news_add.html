<h1 style="
font-size:42px;
margin:20px 0;
">
ニュース英語追加
</h1>

<form method="POST" action="/eng/news_import">

<div style="
font-size:28px;
font-weight:bold;
margin-bottom:10px;
">
会話タイトル
</div>

<input
type="text"
name="conv_title"
placeholder="例: 京都府警ニュース"
style="
width:100%;
font-size:28px;
padding:18px;
margin-bottom:25px;
box-sizing:border-box;
">

<div style="
font-size:28px;
font-weight:bold;
margin-bottom:10px;
">
ニュース本文
</div>

<textarea
name="news_text"
placeholder="ここにニュース英文を貼り付け"
style="
width:100%;
height:400px;
font-size:28px;
padding:20px;
box-sizing:border-box;
"></textarea>

<br><br>

<button
type="submit"
style="
font-size:32px;
padding:20px;
width:100%;
background:#2196f3;
color:white;
border:none;
border-radius:12px;
">

ニュース取り込み

</button>

</form>
